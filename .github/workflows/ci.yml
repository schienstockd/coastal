name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # opencv-python needs these shared libs to import on a headless runner
      - name: System libs (OpenCV)
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch first, so `pip install -e .` doesn't pull the large CUDA wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
